$kind: http-request
name: Copy
method: POST
url: '{{baseUrl}}/api/storage/{{id}}/copy'
description: 'Copies the item with the given identifier to a new parent directory under a new name.'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "parentId": 1,
      "name": "copy-of-example.txt"
    }
